<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Global Railway - Professional GIS Monitor</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
    
    .glass-panel {
      background: rgba(20, 20, 20, 0.8); 
      color: #fff; border: 1px solid rgba(255,255,255,0.1); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Mono", monospace;
      -webkit-backdrop-filter: blur(15px); backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8); 
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-sizing: border-box; 
    }

    #tokenOverlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      display: flex; justify-content: center; align-items: center; 
      z-index: 9999; background: #000; 
    }
    #loginBox { padding: 40px; border-radius: 12px; width: 380px; text-align: center; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; }
    .token-hint { font-size: 11px; color: #888; margin: 18px 0; line-height: 1.6; }
    .token-hint a { color: #5dade2; text-decoration: none; font-weight: bold; }
    #tokenInput { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #444; background: #111; color: #fff; outline: none; text-align: center; box-sizing: border-box; }
    #startBtn { background: #5dade2; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
    
    :root { --sidebar-width: 220px; }
    .hud-hidden #menu, .hud-hidden #infoBar { transform: translateX(-300px); opacity: 0; }
    .hud-hidden #inspectorPanel { transform: translateX(-600px); opacity: 0; }

    #menu { position: absolute; top: 20px; left: 20px; padding: 15px; border-radius: 12px; width: var(--sidebar-width); z-index: 1000; }
    #infoBar { position: absolute; bottom: 40px; left: 20px; padding: 15px; border-radius: 12px; width: var(--sidebar-width); font-size: 11px; z-index: 1000; }
    
    #inspectorPanel { position: absolute; bottom: 40px; left: 250px; padding: 15px; border-radius: 12px; width: 260px; opacity: 0; visibility: hidden; transform: translateX(-20px); z-index: 999; }
    #inspectorPanel.active { opacity: 1; visibility: visible; transform: translateX(0); }
    #closeInspector { position: absolute; right: 10px; top: 10px; cursor: pointer; color: #5dade2; font-size: 18px; font-weight: bold; }

    #hudToggle { position: absolute; bottom: 80px; right: 20px; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; z-index: 1001; display: flex; justify-content: center; align-items: center; font-size: 20px; }

    .label { font-size: 10px; margin-top: 12px; margin-bottom: 5px; color: #5dade2; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid rgba(93, 173, 226, 0.3); }
    select, input[type="range"] { background: #000; color: #fff; border: 1px solid #444; width: 100%; margin-bottom: 8px; }
    .switch-container { display: flex; align-items: center; justify-content: space-between; margin: 5px 0; font-size: 11px; }
    .switch { position: relative; width: 34px; height: 18px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #fff; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background: #5dade2; }
    input:checked + .slider:before { transform: translateX(16px); }
    
    .detail-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .detail-val { color: #5dade2; font-weight: bold; }
    #compassContainer { position: absolute; top: 70px; right: 12px; width: 45px; height: 45px; z-index: 1000; }
  </style>
</head>
<body>

  <div id="tokenOverlay">
    <div id="loginBox" class="glass-panel">
      <h3 style="color:#5dade2; margin-top:0; letter-spacing: 2px;">RAILWAY MONITOR</h3>
      <div class="token-hint">Authorization via <span style="color:#fff;">Cesium Ion Token</span> required.</div>
      <input type="password" id="tokenInput" placeholder="PASTE ACCESS TOKEN">
      <button id="startBtn">INITIALIZE</button>
    </div>
  </div>

  <div id="cesiumContainer"></div>
  <div id="hudToggle" class="glass-panel">🛰️</div>
  
  <div id="menu" class="glass-panel">
    <div class="label">Display</div>
    <div class="switch-container"><span>3D Buildings</span><label class="switch"><input type="checkbox" id="buildingToggle"><span class="slider"></span></label></div>
    <div class="switch-container"><span>Terrain</span><label class="switch"><input type="checkbox" id="terrainToggle"><span class="slider"></span></label></div>
    <div class="switch-container"><span>Day/Night</span><label class="switch"><input type="checkbox" id="lightToggle"><span class="slider"></span></label></div>
    
    <div class="label">Color Saturation</div>
    <input type="range" id="satSlider" min="0" max="3" step="0.1" value="1.0">

    <div class="label">Railway Layer</div>
    <select id="railwaySelect">
      <option value="standard">Infrastructure</option>
      <option value="maxspeed">Max speeds</option>
      <option value="signals">Signalling</option>
      <option value="gauge">Track Gauge</option>
    </select>
    
    <div class="label">Base Map</div>
    <select id="baseSelect">
      <option value="osm">OpenStreetMap</option>
      <option value="dark">ArcGIS Dark Gray</option>
      <option value="arc_std">ArcGIS Street Map</option>
      <option value="arc_sat">ArcGIS Satellite</option>
      <option value="ion_sat">Cesium Ion Aerial</option>
    </select>
  </div>

  <div id="infoBar" class="glass-panel">
    <div id="timeVal" style="color:#5dade2; font-weight:bold; margin-bottom:5px;">00:00:00</div>
    <div id="latVal">LAT: 0.00°</div>
    <div id="lonVal">LON: 0.00°</div>
    <div id="altVal">ALT: --</div>
  </div>

  <div id="inspectorPanel" class="glass-panel">
    <div id="closeInspector">×</div>
    <div id="railDetailContent"></div>
  </div>

  <div id="compassContainer"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/><path d="M50,15 L60,50 L50,45 L40,50 Z" fill="#f1948a"/><path d="M50,85 L60,50 L50,55 L40,50 Z" fill="#5dade2"/></svg></div>

  <script>
    const startBtn = document.getElementById('startBtn');
    startBtn.addEventListener('click', () => {
      const token = document.getElementById('tokenInput').value.trim();
      if (token) initSystem(token);
    });

    async function initSystem(token) {
      Cesium.Ion.defaultAccessToken = token;
      try {
        const viewer = new Cesium.Viewer('cesiumContainer', {
          baseLayerPicker: false, geocoder: false, homeButton: true, infoBox: false,
          timeline: false, animation: false, baseLayer: false
        });

        // HUD Toggle logic
        document.getElementById('hudToggle').onclick = () => {
          document.body.classList.toggle('hud-hidden');
          document.getElementById('hudToggle').innerText = document.body.classList.contains('hud-hidden') ? "🌍" : "🛰️";
        };

        let baseLayer = null, railLayer = null;

        async function updateBaseMap(type) {
          if (baseLayer) viewer.imageryLayers.remove(baseLayer);
          let provider;
          switch(type) {
            case 'osm': provider = new Cesium.OpenStreetMapImageryProvider({ url: 'https://a.tile.openstreetmap.org/' }); break;
            case 'dark': provider = await Cesium.ArcGisMapServerImageryProvider.fromUrl('https://services.arcgisonline.com/arcgis/rest/services/Canvas/World_Dark_Gray_Base/MapServer'); break;
            case 'arc_std': provider = await Cesium.ArcGisMapServerImageryProvider.fromUrl('https://services.arcgisonline.com/arcgis/rest/services/World_Street_Map/MapServer'); break;
            case 'arc_sat': provider = await Cesium.ArcGisMapServerImageryProvider.fromUrl('https://services.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer'); break;
            case 'ion_sat': provider = await Cesium.createWorldImageryAsync(); break;
          }
          baseLayer = viewer.imageryLayers.addImageryProvider(provider, 0);
          applySaturation(); // 套用當前飽和度
        }

        // 飽和度延遲處理 (Debounce)
        let satTimeout;
        const satSlider = document.getElementById('satSlider');
        satSlider.oninput = () => {
          clearTimeout(satTimeout);
          satTimeout = setTimeout(() => applySaturation(), 200);
        };

        function applySaturation() {
          const val = parseFloat(satSlider.value);
          if (baseLayer) baseLayer.saturation = val;
          if (railLayer) railLayer.saturation = val;
        }

        function loadRailway(style) {
          if (railLayer) viewer.imageryLayers.remove(railLayer);
          railLayer = viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
            url: `https://{s}.tiles.openrailwaymap.org/${style}/{z}/{x}/{y}.png`,
            subdomains: ['a', 'b', 'c']
          }));
          applySaturation();
        }

        // UI Events
        document.getElementById('baseSelect').onchange = (e) => updateBaseMap(e.target.value);
        document.getElementById('railwaySelect').onchange = (e) => loadRailway(e.target.value);
        document.getElementById('lightToggle').onchange = (e) => { viewer.scene.globe.enableLighting = e.target.checked; };
        
        let bld = null;
        document.getElementById('buildingToggle').onchange = async (e) => {
          if (e.target.checked) { if(!bld) bld = await Cesium.createOsmBuildingsAsync(); viewer.scene.primitives.add(bld); bld.show = true; }
          else if(bld) bld.show = false;
        };

        // Initialization
        document.getElementById('tokenOverlay').style.display = 'none';
        await updateBaseMap('osm');
        loadRailway('standard');

        viewer.scene.preRender.addEventListener(() => {
          const c = viewer.camera.positionCartographic;
          if (!c) return;
          document.getElementById('latVal').innerText = `LAT: ${Cesium.Math.toDegrees(c.latitude).toFixed(2)}°`;
          document.getElementById('lonVal').innerText = `LON: ${Cesium.Math.toDegrees(c.longitude).toFixed(2)}°`;
          document.getElementById('altVal').innerText = `ALT: ${(c.height/1000).toFixed(0)}km`;
          document.getElementById('compassContainer').style.transform = `rotate(${-Cesium.Math.toDegrees(viewer.camera.heading)}deg)`;
        });

      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>
