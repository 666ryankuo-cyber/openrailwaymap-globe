<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Global Railway - Professional GIS Monitor</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
    
    /* 通用毛玻璃樣式 */
    .glass-panel {
      background: rgba(25, 25, 25, 0.6); 
      color: #fff; border: 1px solid rgba(255,255,255,0.1); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Mono", monospace;
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
    }

    /* Token 輸入遮罩層 */
    #tokenOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      z-index: 9999; background: rgba(0,0,0,0.8);
    }
    #loginBox {
      padding: 30px; border-radius: 15px; width: 400px; text-align: center;
    }
    #loginBox h2 { margin-top: 0; font-size: 18px; color: #5dade2; letter-spacing: 1px; }
    #loginBox p { font-size: 12px; color: #aaa; margin-bottom: 20px; }
    #tokenInput {
      width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px;
      border: 1px solid #444; background: rgba(0,0,0,0.5); color: #fff; font-size: 13px;
      outline: none; box-sizing: border-box;
    }
    #startBtn {
      background: #5dade2; color: #fff; border: none; padding: 10px 25px;
      border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    #startBtn:hover { background: #3498db; transform: translateY(-2px); }

    /* 控制面板（預設隱藏，驗證後顯示） */
    .ui-visible { display: block !important; }
    #menu, #compassContainer, #infoBar { display: none; }

    /* 左側選單 */
    #menu { position: absolute; top: 20px; left: 20px; padding: 18px; border-radius: 12px; width: 220px; z-index: 1000; }
    .label { font-size: 10px; margin-top: 10px; margin-bottom: 8px; color: #5dade2; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
    .label:first-child { margin-top: 0; }
    select { background: rgba(0, 0, 0, 0.5); color: #fff; border: 1px solid #555; padding: 8px; width: 100%; cursor: pointer; border-radius: 6px; font-size: 13px; outline: none; }

    /* 右上指北針 (紅代表北，藍代表南) */
    #compassContainer { position: absolute; top: 80px; right: 20px; width: 60px; height: 60px; z-index: 1000; cursor: pointer; transition: 0.3s; border-radius: 50%; padding: 5px; }
    #compassContainer:hover { transform: scale(1.1); background: rgba(25, 25, 25, 0.6); }
    #compassSvg { width: 100%; height: 100%; }
    .compass-needle-n { fill: #f1948a; } 
    .compass-needle-s { fill: #5dade2; } 
    .compass-center { fill: #fff; stroke: #333; stroke-width: 2; }

    /* 左下 GIS 數據面板 */
    #infoBar { position: absolute; bottom: 50px; left: 20px; padding: 10px 15px; border-radius: 8px; z-index: 1000; font-size: 11px; min-width: 180px; }
    .info-item { display: flex; justify-content: space-between; color: #aaa; margin-bottom: 5px; }
    .info-value { color: #fff; font-weight: 600; margin-left: 10px; }
    #scaleBarWrapper { margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
    #scaleBar { height: 4px; border: 1px solid #fff; border-top: none; width: 100px; position: relative; }
    #scaleLabel { font-size: 9px; margin-bottom: 2px; color: #5dade2; font-weight: bold; }
    #status { font-size: 10px; color: #aaa; margin-top: 12px; text-align: right; }
  </style>
</head>
<body>

  <div id="tokenOverlay">
    <div id="loginBox" class="glass-panel">
      <h2>SYSTEM ACCESS</h2>
      <p>Please enter your Cesium Ion Access Token to initialize the Global Railway Monitor.</p>
      <input type="password" id="tokenInput" placeholder="Paste your token here...">
      <button id="startBtn">INITIALIZE ENGINE</button>
    </div>
  </div>

  <div id="cesiumContainer"></div>
  
  <div id="menu" class="glass-panel">
    <div class="label">Railway Layer</div>
    <select id="railwaySelect">
      <option value="standard">Infrastructure</option>
      <option value="maxspeed">Max speeds</option>
      <option value="signalling">Signalling and train protection</option>
      <option value="electrification">Electrification</option>
      <option value="gauge">Track Gauge</option>
    </select>
    <div class="label">Base Map Style</div>
    <select id="baseSelect">
      <option value="arcgis_gray">ArcGIS Light Gray</option>
      <option value="bing_aerial">Bing Aerial (Satellite)</option>
      <option value="osm">OpenStreetMap Standard</option>
      <option value="blue_marble">NASA Blue Marble</option>
      <option value="black_marble">NASA Black Marble</option>
    </select>
    <div id="status">STATUS: STANDBY</div>
  </div>

  <div id="compassContainer" class="glass-panel" title="Click to reset North">
    <svg id="compassSvg" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.2"/>
      <path d="M50,15 L62,50 L50,45 L38,50 Z" class="compass-needle-n"/>
      <path d="M50,85 L62,50 L50,55 L38,50 Z" class="compass-needle-s"/>
      <circle cx="50" cy="50" r="4" class="compass-center"/>
    </svg>
  </div>

  <div id="infoBar" class="glass-panel">
    <div class="info-item">LAT: <span id="latVal" class="info-value">--</span></div>
    <div class="info-item">LON: <span id="lonVal" class="info-value">--</span></div>
    <div class="info-item">ALT: <span id="altVal" class="info-value">--</span></div>
    <div id="scaleBarWrapper">
      <div id="scaleLabel">WAITING...</div>
      <div id="scaleBar"></div>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const tokenInput = document.getElementById('tokenInput');

    // 監聽啟動按鈕
    startBtn.addEventListener('click', () => {
      const userToken = tokenInput.value.trim();
      if (!userToken) {
        alert("Token is required!");
        return;
      }
      initSystem(userToken);
    });

    // 核心系統初始化函式
    function initSystem(token) {
      Cesium.Ion.defaultAccessToken = token;

      try {
        const viewer = new Cesium.Viewer('cesiumContainer', {
          baseLayerPicker: false, geocoder: false, timeline: false, animation: false,
          sceneModePicker: true, navigationHelpButton: false, infoBox: false,
          selectionIndicator: false, requestRenderMode: true, maximumRenderTimeChange: 0.0,
          baseLayer: false
        });

        // 成功後顯示 UI 並隱藏登入遮罩
        document.getElementById('tokenOverlay').style.display = 'none';
        document.getElementById('menu').classList.add('ui-visible');
        document.getElementById('compassContainer').classList.add('ui-visible');
        document.getElementById('infoBar').classList.add('ui-visible');

        const scene = viewer.scene;
        const ssc = scene.screenSpaceCameraController;
        ssc.constrainedAxis = undefined; // 允許全方位自由旋轉
        ssc.inertiaSpin = 0.88; // 增加旋轉慣性
        ssc.inertiaZoom = 0.75;

        let baseLayer = null;
        let railwayLayer = null;
        let currentRailwayStyle = 'standard';
        let loadTimeout = null;

        // 底圖切換功能
        function updateBaseMap(type) {
          if (baseLayer) viewer.imageryLayers.remove(baseLayer);
          let provider;
          switch(type) {
            case 'bing_aerial': provider = Cesium.createWorldImagery({ style: Cesium.IonWorldImageryStyle.AERIAL }); break;
            case 'osm': provider = new Cesium.OpenStreetMapImageryProvider({ url: 'https://a.tile.openstreetmap.org/' }); break;
            case 'blue_marble': provider = new Cesium.IonImageryProvider({ assetId: 3845 }); break;
            case 'black_marble': provider = new Cesium.IonImageryProvider({ assetId: 3812 }); break;
            default: provider = new Cesium.ArcGisMapServerImageryProvider({ url: 'https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer' });
          }
          baseLayer = viewer.imageryLayers.addImageryProvider(provider, 0);
        }

        // 鐵路圖層切換功能 (OpenRailwayMap)
        function executeRailwayLoading(style) {
          const oldLayer = railwayLayer;
          document.getElementById('status').innerText = "SYNCING...";
          railwayLayer = viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
            url: `https://{s}.tiles.openrailwaymap.org/${style}/{z}/{x}/{y}.png`,
            subdomains: ['a', 'b', 'c'], minimumLevel: 1, maximumLevel: 19
          }));
          // 延遲移除舊圖層，確保載入過程平滑
          setTimeout(() => {
            if (oldLayer) viewer.imageryLayers.remove(oldLayer);
            document.getElementById('status').innerText = "ACTIVE: " + style.toUpperCase();
          }, 700); 
        }

        // 更新 GIS 實時數據
        function updateGISInfo() {
          const camera = viewer.camera;
          const cartographic = camera.positionCartographic;
          // 更新經緯度
          document.getElementById('latVal').innerText = Cesium.Math.toDegrees(cartographic.latitude).toFixed(2) + "°";
          document.getElementById('lonVal').innerText = Cesium.Math.toDegrees(cartographic.longitude).toFixed(2) + "°";
          // 更新高度 (超過 10km 顯示為 km)
          const alt = cartographic.height;
          document.getElementById('altVal').innerText = alt > 10000 ? (alt/1000).toFixed(0) + " km" : alt.toFixed(0) + " m";

          // 計算比例尺 (畫面中心點兩旁的物理距離)
          const width = scene.canvas.clientWidth;
          const height = scene.canvas.clientHeight;
          const leftRay = camera.getPickRay(new Cesium.Cartesian2(width / 2 - 50, height / 2));
          const rightRay = camera.getPickRay(new Cesium.Cartesian2(width / 2 + 50, height / 2));
          const leftPos = scene.globe.pick(leftRay, scene);
          const rightPos = scene.globe.pick(rightRay, scene);

          if (leftPos && rightPos) {
            const distance = Cesium.Cartesian3.distance(leftPos, rightPos);
            document.getElementById('scaleLabel').innerText = distance > 1000 ? (distance / 1000).toFixed(0) + " km" : distance.toFixed(0) + " m";
          }
        }

        // 初始化底圖
        viewer.imageryLayers.removeAll();
        updateBaseMap('arcgis_gray');
        viewer.camera.setView({ destination: Cesium.Cartesian3.fromDegrees(0.0, 0.0, 15000000.0) });

        // 每幀渲染前的監聽事件
        scene.preRender.addEventListener(() => {
          // 同步指北針旋轉
          const rotation = -Cesium.Math.toDegrees(viewer.camera.heading);
          document.getElementById('compassContainer').style.transform = `rotate(${rotation}deg)`;
          // 即時更新 GIS 數據
          updateGISInfo();
        });

        // 點擊指北針回正北方
        document.getElementById('compassContainer').addEventListener('click', () => {
          viewer.camera.flyTo({
            destination: viewer.camera.position,
            orientation: { heading: 0.0, pitch: Cesium.Math.toRadians(-90.0), roll: 0.0 },
            duration: 1.2
          });
        });

        // 下拉選單監聽器
        document.getElementById('baseSelect').addEventListener('change', (e) => updateBaseMap(e.target.value));
        document.getElementById('railwaySelect').addEventListener('change', (e) => {
          currentRailwayStyle = e.target.value;
          executeRailwayLoading(currentRailwayStyle);
        });

        // 相機停止運動後重新整理圖層，優化效能
        viewer.camera.moveEnd.addEventListener(() => {
          if (loadTimeout) clearTimeout(loadTimeout);
          loadTimeout = setTimeout(() => executeRailwayLoading(currentRailwayStyle), 300);
        });

        // 預設載入基礎鐵路圖層
        executeRailwayLoading('standard');

      } catch (e) {
        alert("Initialization failed. Please check if your Token is valid.");
        location.reload();
      }
    }
  </script>
</body>
</html>
