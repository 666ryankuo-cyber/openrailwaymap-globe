<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Global Railway - Professional GIS Monitor</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
    
    .glass-panel {
      background: rgba(30, 30, 30, 0.95); 
      color: #fff; border: 1px solid rgba(255,255,255,0.15); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8); 
      box-sizing: border-box; 
    }

    #tokenOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 9999; background: #000; }
    #loginBox { padding: 40px; border-radius: 12px; width: 400px; text-align: center; border: 1px solid #333; }
    #tokenInput { width: 100%; padding: 12px; margin: 20px 0; border-radius: 6px; border: 1px solid #444; background: #111; color: #fff; text-align: center; box-sizing: border-box; }
    #startBtn { background: #5dade2; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }

    :root { --sidebar-width: 260px; --btn-size: 50px; --right-pos: 20px; }
    .hud-hidden #menu, .hud-hidden #infoBar, .hud-hidden #inspectPanel { transform: translateX(-400px) !important; opacity: 0; pointer-events: none; }
    
    #menu { position: absolute; top: 20px; left: 20px; padding: 20px; border-radius: 12px; width: var(--sidebar-width); z-index: 1000; transition: 0.5s; overflow-y: auto; max-height: 70vh; }
    #searchInput { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #fff; outline: none; margin-bottom: 10px; font-size: 12px; box-sizing: border-box; }
    
    #infoBar { position: absolute; bottom: 40px; left: 20px; padding: 15px; border-radius: 12px; width: var(--sidebar-width); font-size: 11px; z-index: 1000; transition: 0.5s; }

    #inspectPanel { 
      position: absolute; bottom: 40px; left: 300px; padding: 20px; border-radius: 12px; 
      width: 320px; font-size: 12px; z-index: 999; transition: all 0.5s;
      transform: translateX(-50px); opacity: 0; pointer-events: none; overflow-y: auto; max-height: 50vh;
    }
    #inspectPanel.active { transform: translateX(0); opacity: 1; pointer-events: auto; }
    .inspect-tag { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .tag-k { color: #5dade2; font-weight: bold; margin-right: 10px; }
    
    .label { font-size: 10px; margin-top: 12px; margin-bottom: 5px; color: #5dade2; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid rgba(93, 173, 226, 0.3); }
    
    /* 右側按鈕群組 */
    .control-btn { 
      position: absolute; right: var(--right-pos); 
      width: var(--btn-size); height: var(--btn-size); 
      z-index: 1000; cursor: pointer; 
      display: flex; justify-content: center; align-items: center; 
      border-radius: 50%; transition: 0.3s;
    }
    .control-btn:hover { background: rgba(93, 173, 226, 0.3); border-color: #5dade2; }

    #compassContainer { top: 80px; }
    #homeBtn { top: 140px; font-size: 22px; }
    #hudToggle { bottom: 100px; font-size: 20px; } /* HUB 位置往上移 */

    .info-item { display: flex; justify-content: space-between; margin-bottom: 4px; color: #888; }
    .info-val { color: #fff; font-weight: bold; }
    #scaleBarContainer { margin-top: 10px; }
    #scaleBar { height: 3px; border: 1px solid #fff; border-top: none; width: 100px; transition: width 0.3s; }

    .switch-container { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 11px; }
    .switch { position: relative; width: 34px; height: 18px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #fff; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background: #5dade2; }
    input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>

  <div id="tokenOverlay">
    <div id="loginBox" class="glass-panel">
      <h3 style="color:#5dade2; letter-spacing: 2px;">RAILWAY MONITOR</h3>
      <input type="password" id="tokenInput" placeholder="Paste Cesium Ion Token...">
      <button id="startBtn">INITIALIZE SYSTEM</button>
    </div>
  </div>

  <div id="cesiumContainer"></div>

  <div id="compassContainer" class="control-btn glass-panel" title="Reset North">
    <svg viewBox="0 0 100 100" style="width: 80%; height: 80%;">
      <path d="M50,15 L60,50 L50,45 L40,50 Z" fill="#f1948a"/>
      <path d="M50,85 L60,50 L50,55 L40,50 Z" fill="#5dade2"/>
    </svg>
  </div>

  <div id="homeBtn" class="control-btn glass-panel" title="Return to (0,0)">🏠</div>
  <div id="hudToggle" class="control-btn glass-panel" title="Toggle HUD">🛰️</div>
  
  <div id="menu" class="glass-panel">
    <input type="text" id="searchInput" placeholder="Station Search (Enter)..." autocomplete="off">
    <div class="label">Controls</div>
    <div class="switch-container"><span>Auto-Rotation</span><label class="switch"><input type="checkbox" id="rotateToggle"><span class="slider"></span></label></div>
    <div class="switch-container"><span>Inspector Mode</span><label class="switch"><input type="checkbox" id="inspectToggle"><span class="slider"></span></label></div>
    <div class="label">Visuals</div>
    <div class="switch-container"><span>3D Buildings</span><label class="switch"><input type="checkbox" id="buildingToggle"><span class="slider"></span></label></div>
    <div class="switch-container"><span>3D Terrain</span><label class="switch"><input type="checkbox" id="terrainToggle"><span class="slider"></span></label></div>
    <div class="switch-container"><span>Lighting</span><label class="switch"><input type="checkbox" id="lightToggle"><span class="slider"></span></label></div>
  </div>

  <div id="infoBar" class="glass-panel">
    <div class="info-item">LOCAL TIME<span id="timeVal" class="info-val">--:--:--</span></div>
    <div class="info-item">TIMEZONE<span id="tzVal" class="info-val">UTC --</span></div>
    <div class="info-item">LATITUDE<span id="latVal" class="info-val">0.00°</span></div>
    <div class="info-item">LONGITUDE<span id="lonVal" class="info-val">0.00°</span></div>
    <div class="info-item">ALTITUDE<span id="altVal" class="info-val">--</span></div>
    <div id="scaleBarContainer">
      <div id="scaleLabel" style="font-size: 9px; color: #5dade2; font-weight: bold; margin-bottom: 2px;">-- KM</div>
      <div id="scaleBar"></div>
    </div>
  </div>

  <div id="inspectPanel" class="glass-panel">
    <div class="inspect-close" onclick="this.parentElement.classList.remove('active')" style="float:right; cursor:pointer; color:#5dade2;">[X]</div>
    <div class="label">RAILWAY DATA</div>
    <div id="inspectContent"></div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    startBtn.onclick = () => {
      const token = document.getElementById('tokenInput').value.trim();
      if (token) initSystem(token);
    };

    async function initSystem(token) {
      Cesium.Ion.defaultAccessToken = token;
      try {
        const viewer = new Cesium.Viewer('cesiumContainer', {
          baseLayerPicker: false, geocoder: false, homeButton: false, infoBox: false,
          timeline: false, animation: false, baseLayer: false,
          terrainProvider: new Cesium.EllipsoidTerrainProvider()
        });

        const DEFAULT_HEIGHT = 20000000.0;
        let baseLayer = null, isRotating = false;

        // --- 1. 車站搜尋 + 圓形 Pin ---
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('keypress', async (e) => {
          if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (!query) return;
            try {
              const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ' station')}&limit=1`);
              const data = await res.json();
              if (data?.[0]) {
                const lon = parseFloat(data[0].lon), lat = parseFloat(data[0].lat);
                viewer.entities.removeAll();
                viewer.entities.add({
                  position: Cesium.Cartesian3.fromDegrees(lon, lat),
                  point: { pixelSize: 15, color: Cesium.Color.DODGERBLUE, outlineColor: Cesium.Color.WHITE, outlineWidth: 3 }
                });
                viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(lon, lat, 10000) });
              }
            } catch (err) { console.error(err); }
            searchInput.value = ''; searchInput.blur();
          }
        });

        // 點擊地圖取消 Pin
        viewer.screenSpaceEventHandler.setInputAction(() => viewer.entities.removeAll(), Cesium.ScreenSpaceEventType.LEFT_CLICK);

        // --- 2. 按鈕功能 ---
        document.getElementById('homeBtn').onclick = () => {
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(0, 0, DEFAULT_HEIGHT),
            orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 }
          });
        };

        document.getElementById('compassContainer').onclick = () => {
          viewer.camera.flyTo({
            destination: viewer.camera.position,
            orientation: { heading: Cesium.Math.toRadians(0), pitch: viewer.camera.pitch, roll: 0 }
          });
        };

        document.getElementById('hudToggle').onclick = () => document.body.classList.toggle('hud-hidden');

        // --- 3. HUD 更新 (中心點邏輯) ---
        function updateHUD() {
          const canvas = viewer.scene.canvas;
          const center = new Cesium.Cartesian2(canvas.clientWidth / 2, canvas.clientHeight / 2);
          const ray = viewer.camera.getPickRay(center);
          const target = viewer.scene.globe.pick(ray, viewer.scene);

          if (target) {
            const carto = Cesium.Cartographic.fromCartesian(target);
            const lat = Cesium.Math.toDegrees(carto.latitude);
            const lon = Cesium.Math.toDegrees(carto.longitude);
            
            // 計算時區與時間
            const tzOffset = Math.round(lon / 15);
            const date = new Date();
            const utc = date.getTime() + (date.getTimezoneOffset() * 60000);
            const localTime = new Date(utc + (3600000 * tzOffset));

            document.getElementById('timeVal').innerText = localTime.toLocaleTimeString();
            document.getElementById('tzVal').innerText = `UTC ${tzOffset >= 0 ? '+' : ''}${tzOffset}`;
            document.getElementById('latVal').innerText = `${lat.toFixed(4)}°`;
            document.getElementById('lonVal').innerText = `${lon.toFixed(4)}°`;
            document.getElementById('altVal').innerText = `${(viewer.camera.positionCartographic.height / 1000).toFixed(0)} KM`;

            // 比例尺計算
            const left = viewer.camera.getPickRay(new Cesium.Cartesian2(center.x - 50, center.y));
            const right = viewer.camera.getPickRay(new Cesium.Cartesian2(center.x + 50, center.y));
            const pLeft = viewer.scene.globe.pick(left, viewer.scene);
            const pRight = viewer.scene.globe.pick(right, viewer.scene);
            if (pLeft && pRight) {
              const dist = Cesium.Cartesian3.distance(pLeft, pRight) / 1000;
              document.getElementById('scaleLabel').innerText = dist > 1 ? `${dist.toFixed(1)} KM` : `${(dist*1000).toFixed(0)} M`;
            }
          }
          document.getElementById('compassContainer').style.transform = `rotate(${-Cesium.Math.toDegrees(viewer.camera.heading)}deg)`;
        }
        viewer.scene.preRender.addEventListener(updateHUD);

        // --- 4. Inspector 亂碼修復 ---
        const inspectToggle = document.getElementById('inspectToggle');
        const inspectPanel = document.getElementById('inspectPanel');
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(async (click) => {
          if (!inspectToggle.checked) return;
          const ray = viewer.camera.getPickRay(click.position);
          const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
          if (cartesian) {
            const carto = Cesium.Cartographic.fromCartesian(cartesian);
            const query = `[out:json];way(around:200,${Cesium.Math.toDegrees(carto.latitude)},${Cesium.Math.toDegrees(carto.longitude)})[railway];out tags;`;
            inspectPanel.classList.add('active');
            document.getElementById('inspectContent').innerHTML = "Loading...";
            try {
              const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
              const data = await res.json();
              const tags = data?.elements?.[0]?.tags;
              if (tags) {
                let html = "";
                for (let key in tags) {
                  html += `<div class="inspect-tag"><span class="tag-k">${key}</span><span class="tag-v">${tags[key]}</span></div>`;
                }
                document.getElementById('inspectContent').innerHTML = html;
              } else {
                document.getElementById('inspectContent').innerHTML = "No railway found.";
              }
            } catch (e) { document.getElementById('inspectContent').innerHTML = "Error fetching data."; }
          }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        // 初始化底圖
        baseLayer = viewer.imageryLayers.addImageryProvider(new Cesium.OpenStreetMapImageryProvider({ url: 'https://a.tile.openstreetmap.org/' }));
        viewer.camera.setView({ destination: Cesium.Cartesian3.fromDegrees(0, 0, DEFAULT_HEIGHT) });
        document.getElementById('tokenOverlay').style.display = 'none';

      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>
